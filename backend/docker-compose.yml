services:
  postgres:
    image: postgres:16
    container_name: mentors-postgres
    environment:
      POSTGRES_USER: mentors
      POSTGRES_PASSWORD: mentors
      POSTGRES_DB: mentors
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentors"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: mentors-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: mentors-chroma
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

volumes:
  pgdata:
  chromadata:
