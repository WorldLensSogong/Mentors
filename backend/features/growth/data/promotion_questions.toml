[[tiers.T4.applied_questions]]
id = "t4-a1"
concept_id = 403
prompt = "A기업은 3년 연속 당기순이익이 늘었지만, 같은 기간 영업현금흐름은 매년 감소했습니다. 이익의 질 관점에서 가장 먼저 확인할 항목은?"
correct_choice_id = "A"
[tiers.T4.applied_questions.choices]
A = "일회성 이익이나 회계 처리 차이가 이익을 부풀리고 있는지 확인합니다."
B = "당기순이익이 늘었으므로 현금흐름은 무시합니다."
C = "배당수익률이 높은지 확인합니다."
D = "외국인 매수세가 있는지 확인합니다."

[[tiers.T4.applied_questions]]
id = "t4-a2"
concept_id = 406
prompt = "DCF 분석에서 미래 현금흐름 추정을 그대로 두고 할인율만 높이면 기업의 추정 내재가치는 어떻게 변하나요? 그리고 그 이유는 무엇인가요?"
correct_choice_id = "D"
[tiers.T4.applied_questions.choices]
A = "내재가치가 올라갑니다."
B = "내재가치는 변하지 않습니다."
C = "할인율과 내재가치는 무관합니다."
