# 승급시험 구성 (티어당 총 10문항):
#   reuse_question_ids = 팔로우업 퀴즈 10개 중 8개를 그대로 가져옴
#   applied_questions  = 팔로우업 개념을 응용한 신규 2문항

# ────────────────────────────────────────────
# T1 승급시험 → T2
# ────────────────────────────────────────────
[tiers.T1]
reuse_question_ids = [
  "t1-f1", "t1-f2",
  "t1-f3", "t1-f4",
  "t1-f5", "t1-f6",
  "t1-f7", "t1-f8",
]

[[tiers.T1.applied_questions]]
id = "t1-a1"
concept_id = 101
prompt = "내재가치를 10만원으로 추정했는데, 이후 예상 실적이 10% 하락해 내재가치가 9만원으로 수정됐습니다. 현재 주가는 6만원입니다. 안전마진 관점에서 올바른 해석은 무엇인가요?"
correct_choice_id = "B"
[tiers.T1.applied_questions.choices]
A = "실적이 하락했으므로 즉시 매도해야 합니다."
B = "주가 6만원은 수정된 내재가치 9만원보다도 낮아 여전히 안전마진이 존재합니다."
C = "안전마진은 최초 추정값만 기준으로 계산하므로 수정이 필요 없습니다."
D = "내재가치 추정치가 바뀌면 안전마진 개념 자체가 무효입니다."

[[tiers.T1.applied_questions]]
id = "t1-a2"
concept_id = 106
prompt = "A씨는 연 10% 수익률로 100만원을 10년간 투자했습니다. 단리 방식과 복리 방식 중 복리가 더 유리한 핵심 이유는 무엇인가요?"
correct_choice_id = "D"
[tiers.T1.applied_questions.choices]
A = "복리는 원금이 줄어들지 않기 때문입니다."
B = "복리는 세금이 없기 때문입니다."
C = "복리는 단리보다 수익률이 항상 더 높기 때문입니다."
D = "복리는 이전 기간의 이익이 원금에 더해져 다음 기간에 다시 이익을 만들기 때문입니다."

