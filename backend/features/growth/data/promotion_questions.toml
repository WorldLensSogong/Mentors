[[tiers.T5.applied_questions]]
id = "t5-a1"
concept_id = 503
prompt = "포트폴리오 전체가 미리 정한 최대 손실 한도인 10%에 도달했습니다. 리스크 거버넌스 원칙에 따른 가장 적절한 행동은?"
correct_choice_id = "B"
[tiers.T5.applied_questions.choices]
A = "손실이 나면 즉시 전량 매도합니다."
B = "미리 정해둔 손실 대응 규칙을 확인하고 그에 따라 행동합니다."
C = "손실이 났을 때는 규칙 없이 버티는 것이 원칙입니다."
D = "SNS에서 다른 사람의 대응 방식을 찾아 따릅니다."

[[tiers.T5.applied_questions]]
id = "t5-a2"
concept_id = 507
prompt = "보유 종목의 부정적인 실적 발표를 보고 '이것은 일시적인 요인 때문'이라고 판단하며 계속 보유했습니다. 이후 실적이 구조적으로 악화된 것으로 밝혀졌다면, 처음 판단 시 어떤 인지 편향이 작용했을 가능성이 높은가요?"
correct_choice_id = "C"
[tiers.T5.applied_questions.choices]
A = "군중 심리(herding bias)"
B = "계획 오류(planning fallacy)"
C = "확증 편향(confirmation bias), 자신의 투자 논리에 유리한 해석만 받아들인 것입니다."
D = "매몰비용 오류(sunk cost fallacy)"
