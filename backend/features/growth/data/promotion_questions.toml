  "t2-f1", "t2-f2",
  "t2-f3", "t2-f4",
  "t2-f5", "t2-f6",
  "t2-f7", "t2-f8",
]

[[tiers.T2.applied_questions]]
id = "t2-a1"
concept_id = 202
prompt = "성장주 A에 강한 매수 확신이 있는데, '매출 성장률이 둔화되면 밸류에이션이 지탱되기 어렵다'는 반대 의견을 읽었습니다. 반대 의견 점검 관점에서 가장 적절한 다음 단계는?"
correct_choice_id = "B"
[tiers.T2.applied_questions.choices]
A = "확신이 있으므로 반대 의견을 무시합니다."
B = "매출 성장률 둔화 가능성을 직접 확인하고 내 논리를 흔드는지 점검합니다."
C = "반대 의견이 나왔으므로 즉시 매도합니다."
D = "다른 사람도 동일하게 반대하는지 확인합니다."

[[tiers.T2.applied_questions]]
id = "t2-a2"
concept_id = 209
prompt = "투자 후보 기업 A의 부채비율이 업계 평균의 3배입니다. 이 수치만 보고 투자를 즉시 배제하기 전에 가장 먼저 확인해야 할 것은 무엇인가요?"
correct_choice_id = "D"
[tiers.T2.applied_questions.choices]
A = "배당수익률이 높은지"
B = "최근 뉴스가 긍정적인지"
C = "주가가 저점 대비 얼마나 올랐는지"
D = "해당 업종에서 높은 부채비율이 일반적인지, 그리고 이자를 감당할 이익과 현금흐름이 있는지"

