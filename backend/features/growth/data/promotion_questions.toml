  "t3-f7", "t3-f8",
]

[[tiers.T3.applied_questions]]
id = "t3-a1"
concept_id = 302
prompt = "경기 둔화 우려가 커지는 시점에 필수소비재·유틸리티 같은 방어 섹터로 자금이 이동하는 것을 관찰했습니다. 섹터 순환 관점에서 가장 적절한 해석은?"
correct_choice_id = "C"
[tiers.T3.applied_questions.choices]
A = "방어주로 자금이 이동하는 것은 강세장 본격 진입 신호입니다."
B = "섹터 이동은 무작위이므로 해석할 필요가 없습니다."
C = "경기 둔화 우려 시 안정적 현금흐름 섹터로 이동하는 전형적인 순환 패턴입니다."
D = "방어주는 경기 호황기에만 오릅니다."

[[tiers.T3.applied_questions]]
id = "t3-a2"
concept_id = 306
prompt = "중앙은행이 예상보다 빠른 속도로 금리를 올리기로 했습니다. 미래 이익 기대가 큰 고성장 기업 A와 현재 안정적 현금흐름이 있는 배당 기업 B를 보유 중이라면, 상대적으로 더 먼저 점검이 필요한 쪽은?"
correct_choice_id = "C"
[tiers.T3.applied_questions.choices]
A = "B, 현금흐름이 있어서 금리 상승에 더 취약합니다."
B = "둘 다 같습니다. 금리는 모든 기업에 동일하게 영향을 줍니다."
C = "A, 먼 미래 이익의 현재가치가 더 크게 줄어들 수 있기 때문입니다."
D = "금리 변화는 주식 시장과 무관합니다."

